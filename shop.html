<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LOLAGENT Shop</title>

<!-- PI SDK -->
<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#020617;
  color:white;
  font-family:Arial,sans-serif;
  padding:30px;
}

.container{
  max-width:1200px;
  margin:auto;
}

h1{
  text-align:center;
  margin-bottom:40px;
  color:#38bdf8;
  font-size:42px;
}

.products{
  display:grid;
  grid-template-columns:
  repeat(auto-fit,minmax(280px,1fr));
  gap:25px;
}

.card{
  background:#111827;
  border-radius:24px;
  padding:25px;
  border:1px solid rgba(255,255,255,0.08);
  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.card img{
  width:100%;
  border-radius:18px;
  margin-bottom:20px;
}

.card h2{
  margin-bottom:10px;
}

.price{
  color:#38bdf8;
  font-size:28px;
  font-weight:bold;
  margin:20px 0;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#38bdf8;
  color:black;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  opacity:0.9;
}

.status{
  margin-top:15px;
  font-size:14px;
  color:#94a3b8;
}

</style>

</head>

<body>

<div class="container">

<h1>LOLAGENT SHOP 🛒</h1>

<div class="products">

<!-- PRODUCT 1 -->
<div class="card">

<img
src="assets/logo.png"
alt="LOLAGENT"
/>

<h2>LOLAGENT NFT</h2>

<div class="price">
1 PI
</div>

<button
onclick="buyProduct(
'LOLAGENT NFT',
1
)"
>
Buy Now
</button>

<div class="status">
Instant delivery after payment
</div>

</div>


<!-- PRODUCT 2 -->
<div class="card">

<img
src="assets/logo.png"
alt="LOLAGENT"
/>

<h2>LOLAGENT Hoodie</h2>

<div class="price">
2 PI
</div>

<button
onclick="buyProduct(
'LOLAGENT Hoodie',
2
)"
>
Buy Now
</button>

<div class="status">
Official LOLAGENT merch
</div>

</div>


<!-- PRODUCT 3 -->
<div class="card">

<img
src="assets/logo.png"
alt="LOLAGENT"
/>

<h2>LOLAGENT Premium</h2>

<div class="price">
5 PI
</div>

<button
onclick="buyProduct(
'LOLAGENT Premium',
5
)"
>
Buy Now
</button>

<div class="status">
Unlock premium access
</div>

</div>

</div>

</div>

<script>

// INIT PI SDK
Pi.init({
  version: "2.0",
  sandbox: true
});

// BUY FUNCTION
async function buyProduct(product, amount){

  try{

    // LOGIN PI
    const scopes = ['payments'];

    const auth = await Pi.authenticate(
      scopes,
      function(payment){
        console.log(payment);
      }
    );

    console.log("User:", auth.user);

    // PAYMENT DATA
    const paymentData = {

      amount: amount,

      memo: `Purchase ${product}`,

      metadata: {
        product: product
      }

    };

    // CALLBACKS
    const paymentCallbacks = {

      // APPROVE
      onReadyForServerApproval:
      async function(paymentId){

        console.log(
          "Ready for approval:",
          paymentId
        );

        const approve =
        await fetch("/approve",{

          method:"POST",

          headers:{
            "Content-Type":"application/json"
          },

          body:JSON.stringify({
            paymentId
          })

        });

        const approveData =
        await approve.json();

        console.log(
          "Approved:",
          approveData
        );

      },

      // COMPLETE
      onReadyForServerCompletion:
      async function(paymentId, txid){

        console.log(
          "Ready for completion:",
          paymentId,
          txid
        );

        const complete =
        await fetch("/complete",{

          method:"POST",

          headers:{
            "Content-Type":"application/json"
          },

          body:JSON.stringify({
            paymentId,
            txid
          })

        });

        const completeData =
        await complete.json();

        console.log(
          "Completed:",
          completeData
        );

        alert(
          "Payment Successful ✅"
        );

      },

      // CANCEL
      onCancel: function(paymentId){

        console.log(
          "Payment Cancelled:",
          paymentId
        );

        alert(
          "Payment Cancelled ❌"
        );

      },

      // ERROR
      onError: function(error){

        console.error(error);

        alert(
          "Payment Error ❌"
        );

      }

    };

    // CREATE PAYMENT
    await Pi.createPayment(
      paymentData,
      paymentCallbacks
    );

  }catch(err){

    console.error(err);

    alert(
      "Login Failed"
    );

  }

}

</script>

</body>
</html>
