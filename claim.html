<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>LOLAGENT Faucet Claim</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
}

.card{
width:100%;
max-width:420px;
background:#111827;
border:1px solid #1f2937;
border-radius:20px;
padding:30px;
box-shadow:0 0 30px rgba(0,0,0,0.4);
}

.logo{
width:90px;
height:90px;
border-radius:50%;
display:block;
margin:auto;
margin-bottom:20px;
object-fit:cover;
border:3px solid #7c3aed;
}

h1{
text-align:center;
font-size:28px;
margin-bottom:10px;
}

.desc{
text-align:center;
color:#9ca3af;
font-size:14px;
margin-bottom:25px;
line-height:1.5;
}

.info{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-bottom:20px;
}

.info p{
margin-bottom:8px;
font-size:14px;
}

.walletBox{
background:#1f2937;
padding:14px;
border-radius:12px;
margin-bottom:18px;
font-size:13px;
word-break:break-all;
color:#cbd5e1;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#7c3aed;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
margin-bottom:12px;
}

button:hover{
opacity:0.9;
transform:scale(1.02);
}

.claimBtn{
background:#10b981;
}

.status{
margin-top:20px;
padding:15px;
border-radius:12px;
font-size:14px;
display:none;
}

.success{
background:#064e3b;
color:#6ee7b7;
}

.error{
background:#7f1d1d;
color:#fca5a5;
}

.loading{
background:#1e3a8a;
color:#93c5fd;
}

.footer{
text-align:center;
margin-top:20px;
font-size:12px;
color:#6b7280;
}

</style>
</head>

<body>

<div class="card">

<img
class="logo"
src="https://lolagent-chi.vercel.app/logo.png"
/>

<h1>LOLA Faucet</h1>

<p class="desc">
Connect your Pi Wallet and claim free LOLA token.
</p>

<div class="info">
<p>🎁 Reward: <b>100 LOLA</b></p>
<p>⏳ Claim: <b>1x per wallet</b></p>
<p>🌐 Network: <b>Pi Testnet</b></p>
</div>

<div class="walletBox" id="walletBox">
Wallet not connected
</div>

<button onclick="connectWallet()">
CONNECT PI WALLET
</button>

<button
class="claimBtn"
onclick="claimLOLA()"
>
CLAIM LOLA
</button>

<div id="status" class="status"></div>

<div class="footer">
LOLAGENT © 2026
</div>

</div>

<script>

Pi.init({
version:"2.0",
sandbox:true
});

let currentWallet = null;

async function connectWallet(){

const status =
document.getElementById("status");

try{

status.style.display = "block";
status.className = "status loading";
status.innerHTML = "Connecting Pi Wallet...";

const scopes = ['username','payments','wallet_address'];

const auth = await Pi.authenticate(
scopes,
function(payment){},
function(error){}
);

currentWallet = auth.wallet_address;

localStorage.setItem(
"wallet",
currentWallet
);

document.getElementById(
"walletBox"
).innerHTML =
"✅ " + currentWallet;

status.className = "status success";
status.innerHTML = "Wallet connected successfully";

}catch(err){

status.className = "status error";
status.innerHTML = "Failed connect wallet";

console.log(err);

}

}

async function claimLOLA(){

const status =
document.getElementById("status");

const wallet =
localStorage.getItem("wallet");

if(!wallet){

status.style.display = "block";
status.className = "status error";
status.innerHTML = "Connect wallet first";

return;
}

try{

status.style.display = "block";
status.className = "status loading";
status.innerHTML = "Processing claim...";

const response = await fetch(
"/api/claim",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
wallet
})
}
);

const data = await response.json();

if(data.success){

status.className = "status success";

status.innerHTML = `
✅ Claim Success<br><br>
TX Hash:<br>
${data.hash}
`;

}else{

status.className = "status error";

status.innerHTML = `
❌ ${data.message}
`;

}

}catch(err){

status.className = "status error";

status.innerHTML = `
❌ Server error
`;

console.log(err);

}

}

window.onload = () => {

const savedWallet =
localStorage.getItem("wallet");

if(savedWallet){

currentWallet = savedWallet;

document.getElementById(
"walletBox"
).innerHTML =
"✅ " + savedWallet;

}

};

</script>

</body>
</html>
