<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>LOLA Faucet</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#020617;
    font-family:Arial, sans-serif;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.box{
    width:100%;
    max-width:400px;
    background:#0f172a;
    border:1px solid #1e293b;
    border-radius:24px;
    padding:30px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,0.5);
}

.logo{
    width:90px;
    height:90px;
    border-radius:50%;
    margin-bottom:15px;
    border:3px solid #7c3aed;
}

h1{
    font-size:32px;
    margin-bottom:10px;
}

p{
    color:#94a3b8;
    margin-bottom:20px;
}

.info{
    background:#111827;
    border-radius:15px;
    padding:15px;
    margin-bottom:20px;
    text-align:left;
    font-size:14px;
}

.info div{
    margin-bottom:8px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    margin-top:12px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    transform:scale(1.02);
}

.connect{
    background:#7c3aed;
    color:white;
}

.claim{
    background:#22c55e;
    color:white;
}

.claim:disabled{
    background:#334155;
    cursor:not-allowed;
}

#status{
    margin-top:20px;
    padding:12px;
    background:#111827;
    border-radius:12px;
    font-size:14px;
    color:#cbd5e1;
    word-break:break-word;
}

.success{
    color:#22c55e;
}

.error{
    color:#ef4444;
}

.loading{
    color:#facc15;
}

</style>
</head>

<body>

<div class="box">

    <img
    src="https://lolagent-chi.vercel.app/logo.png"
    class="logo"
    />

    <h1>LOLA Faucet</h1>

    <p>Claim FREE LOLA Tokens</p>

    <div class="info">

        <div>
            Faucet Reward:
            <b>100 LOLA</b>
        </div>

        <div>
            Network:
            <b>Pi Testnet</b>
        </div>

        <div>
            Status:
            <span id="walletStatus">
                Not Connected
            </span>
        </div>

    </div>

    <button
    class="connect"
    onclick="connectWallet()"
    id="connectBtn"
    >
        Connect Pi Wallet
    </button>

    <button
    class="claim"
    onclick="claimToken()"
    id="claimBtn"
    disabled
    >
        Claim LOLA
    </button>

    <div id="status">
        Waiting connection...
    </div>

</div>

<script>

Pi.init({
    version: "2.0",
    sandbox: true
});

let currentUser = null;

function setStatus(text, type=""){

    const status = document.getElementById("status");

    status.className = "";

    if(type){
        status.classList.add(type);
    }

    status.innerHTML = text;
}

async function connectWallet(){

    try{

        setStatus(
            "Connecting wallet...",
            "loading"
        );

        const scopes = ['payments', 'username'];

        const authResult =
            await Pi.authenticate(
                scopes,
                onIncompletePaymentFound
            );

        console.log(authResult);

        currentUser = authResult.user;

        document
        .getElementById("walletStatus")
        .innerHTML =
            currentUser.username;

        document
        .getElementById("claimBtn")
        .disabled = false;

        setStatus(
            "Wallet connected successfully ✅",
            "success"
        );

    }catch(err){

        console.error(err);

        setStatus(
            "Wallet connection failed ❌",
            "error"
        );

    }

}

function onIncompletePaymentFound(payment){

    console.log(
        "Incomplete Payment Found:",
        payment
    );

}

async function claimToken(){

    if(!currentUser){

        setStatus(
            "Connect wallet first",
            "error"
        );

        return;
    }

    try{

        document
        .getElementById("claimBtn")
        .disabled = true;

        setStatus(
            "Checking claim eligibility...",
            "loading"
        );

        const response = await fetch(
            "/api/claim",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    uid: currentUser.uid,
                    username: currentUser.username
                })
            }
        );

        const data = await response.json();

        console.log(data);

        if(data.success){

            setStatus(
                `
                SUCCESS CLAIM LOLA ✅
                <br><br>
                TX HASH:
                <br>
                ${data.txid || "-"}
                `,
                "success"
            );

        }else{

            setStatus(
                data.error || "Claim failed",
                "error"
            );

        }

    }catch(err){

        console.error(err);

        setStatus(
            "Server error ❌",
            "error"
        );

    }

    document
    .getElementById("claimBtn")
    .disabled = false;

}

</script>

</body>
</html>
