<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LOLAGENT Node Monitor</title>

<style>

body{
  background:#020617;
  color:white;
  font-family:Arial;
  padding:30px;
}

.container{
  max-width:1000px;
  margin:auto;
}

h1{
  color:#38bdf8;
  margin-bottom:30px;
}

.card{
  background:#111827;
  padding:25px;
  border-radius:20px;
  margin-bottom:20px;
  border:1px solid rgba(255,255,255,0.08);
}

.status{
  color:#22c55e;
  font-weight:bold;
}

.stat{
  margin-top:10px;
  color:#cbd5e1;
}

button{
  background:#38bdf8;
  border:none;
  padding:15px 25px;
  border-radius:14px;
  cursor:pointer;
  font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>LOLAGENT NODE MONITOR 🚀</h1>

<div class="card">

<h2>Pi Node Status</h2>

<div class="status">
ONLINE
</div>

<div class="stat">
Latency: 42ms
</div>

<div class="stat">
Peers: 128
</div>

<div class="stat">
Sync: 100%
</div>

</div>

<div class="card">

<h2>RPC Endpoint</h2>

<p>
https://lolagent-chi.vercel.app/api/rpc
</p>

<button onclick="testNode()">
Test Node
</button>

</div>

<pre id="output"></pre>

</div>

<script>

async function testNode(){

  try{

    const response =
    await fetch('/api/rpc?method=network');

    const data =
    await response.json();

    document.getElementById(
      'output'
    ).innerHTML =
    JSON.stringify(data,null,2);

  }catch(err){

    document.getElementById(
      'output'
    ).innerHTML =
    err.message;

  }

}

</script>

</body>
</html>
