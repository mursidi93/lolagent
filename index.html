<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOLA ECONOMY DASHBOARD</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script src="/socket.io/socket.io.js"></script>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

/* NAV */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
padding:10px;
background:#111827;
border-radius:12px;
}

.navbar a{
color:#cbd5e1;
margin:0 8px;
text-decoration:none;
font-size:13px;
}

/* LOGO */
.logo-img{
width:45px;
height:45px;
border-radius:50%;
border:2px solid #38bdf8;
}

/* CARD */
.card{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-bottom:10px;
border:1px solid #334155;
}

.value{
color:#22c55e;
font-size:22px;
font-weight:bold;
margin-top:5px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

/* BUTTON */
button{
padding:10px 14px;
margin:5px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.blue{background:#38bdf8;}
.green{background:#22c55e;}
.purple{background:#7c3aed;color:white;}

#leaderboard{
margin-top:10px;
}

#user-info{
margin-top:10px;
color:#cbd5e1;
}
</style>
</head>

<body>

<div class="container">

<!-- NAV -->
<div class="navbar">
<img class="logo-img" src="logo.png">

<div>
<a href="/">Home</a>
<a href="/claim.html">Faucet</a>
<a href="/quest.html">Quest</a>
<a href="/mining.html">Mining</a>
<a href="/stake.html">Stake</a>
<a href="/roadmap.html">Roadmap</a>
<a href="/whitepaper.html">Whitepaper</a>
</div>
</div>

<h1>LOL AGENT</h1>

<button class="blue" onclick="followX()">Follow X</button>
<button class="blue" onclick="joinTG()">Telegram</button>
<button class="purple" onclick="loginPi()">Connect Pi</button>
<button class="green" onclick="buyLOLA()">Buy 1 PI = 1000 LOLA</button>

<hr>

<!-- USER -->
<div id="user-info">Wallet not connected</div>

<!-- ECONOMY -->
<div class="grid">

<div class="card">
TOTAL SUPPLY
<div class="value" id="totalSupply">0</div>
</div>

<div class="card">
CIRCULATING
<div class="value" id="circulating">0</div>
</div>

<div class="card">
LOCKED
<div class="value" id="locked">0</div>
</div>

<div class="card">
LIQUIDITY
<div class="value" id="liquidity">0</div>
</div>

<div class="card">
REWARD POOL
<div class="value" id="rewardPool">0</div>
</div>

<div class="card">
BURNED
<div class="value" id="burned">0</div>
</div>

</div>

<!-- LEADERBOARD -->
<div class="card">
<h3>🏆 Leaderboard</h3>
<div id="leaderboard">Loading...</div>
</div>

</div>

<script>

const API = "https://lolagent-backend-production.up.railway.app";
const socket = io(API);

let currentUser = null;

/* ================= ECONOMY LOAD ================= */
async function loadEconomy(){
try{
const res = await fetch(API + "/api/dashboard");
const data = await res.json();

if(data.success){
renderEco(data.economy);
}

}catch(e){
console.log(e);
}
}

function renderEco(eco){
document.getElementById("totalSupply").innerText = eco.totalSupply.toLocaleString();
document.getElementById("circulating").innerText = eco.circulating.toLocaleString();
document.getElementById("locked").innerText = eco.locked.toLocaleString();
document.getElementById("liquidity").innerText = eco.liquidity.toLocaleString();
document.getElementById("rewardPool").innerText = eco.rewardPool.toLocaleString();
document.getElementById("burned").innerText = eco.burned.toLocaleString();
}

/* SOCKET REALTIME */
socket.on("economy:update",(eco)=>{
renderEco(eco);
});

/* LEADERBOARD */
socket.on("leaderboard:update",(data)=>{
let html="";
data.forEach((u,i)=>{
html += `#${i+1} ${u.userId} - ${u.mined} LOLA<br>`;
});
document.getElementById("leaderboard").innerHTML = html;
});

/* ================= PI SDK ================= */
Pi.init({ version:"2.0", sandbox:true });

function loginPi(){

if(!window.Pi){
alert("Open in Pi Browser");
return;
}

Pi.authenticate(
["username","payments","wallet_address"],
function(payment){ console.log(payment); }
).then(auth=>{

currentUser = auth;

document.getElementById("user-info").innerHTML =
`User: ${auth.user.username}<br>Wallet: ${auth.user.wallet_address}`;

alert("Connected ✔");

}).catch(err=>{
console.log(err);
alert("Login failed");
});

}

/* ================= BUY ================= */
function buyLOLA(){

if(!currentUser){
alert("Connect Pi first");
return;
}

Pi.createPayment({
amount:1,
memo:"BUY LOLA",
metadata:{type:"BUY"}
},{
onReadyForServerApproval: async(paymentId)=>{

await fetch(API+"/api/pay/approve",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({paymentId})
});

},

onReadyForServerCompletion: async(paymentId,txid)=>{

await fetch(API+"/api/pay/complete",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({paymentId,txid})
});

alert("BUY SUCCESS 🚀");

},

onError:(e)=>console.log(e)

});

}

/* ACTION */
function followX(){
window.open("https://x.com/LolAgentAi","_blank");
}

function joinTG(){
window.open("https://t.me/LOLAgentHQ","_blank");
}

/* INIT */
loadEconomy();
setInterval(loadEconomy,5000);

</script>

</body>
</html>
