<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOL AGENT</title>
<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script src="/socket.io/socket.io.js"></script>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

/* NAV */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
padding:10px;
background:#111827;
border-radius:12px;
}

.navbar a{
color:#cbd5e1;
margin:0 8px;
text-decoration:none;
font-size:13px;
}

.logo-img{
width:45px;
height:45px;
border-radius:50%;
border:2px solid #38bdf8;
}

/* CARD */
.card{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-bottom:10px;
border:1px solid #334155;
}

/* 2 BARIS ECONOMY */
.econ-title{
font-size:13px;
color:#94a3b8;
}

.value{
color:#22c55e;
font-size:22px;
font-weight:bold;
margin-top:5px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

/* BUTTON */
button{
padding:10px 14px;
margin:5px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.blue{background:#38bdf8;}
.green{background:#22c55e;}
.purple{background:#7c3aed;color:white;}

#leaderboard{
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<!-- NAVBAR -->
<div class="navbar">
<img class="logo-img" src="logo.png">

<div>
<a href="/">Home</a>
<a href="/claim.html">Faucet</a>
<a href="/quest.html">Quest</a>
<a href="/mining.html">Mining</a>
<a href="/stake.html">Stake</a>
<a href="/roadmap.html">Roadmap</a>
<a href="/whitepaper.html">Whitepaper</a>
</div>
</div>

<!-- HERO -->
<h1>LOLA ECONOMY V3 GOD MODE</h1>

<button class="blue" onclick="followX()">Follow X</button>
<button class="blue" onclick="joinTG()">Telegram</button>
<button class="purple" onclick="connectPi()">Connect Pi</button>
<button class="green" onclick="buyLOLA()">Buy 1 PI = 1000 LOLA</button>

<hr>

<!-- ECONOMY GRID -->
<div class="grid">

<div class="card">
<div class="econ-title">TOTAL SUPPLY</div>
<div class="value" id="totalSupply">0</div>
</div>

<div class="card">
<div class="econ-title">CIRCULATING</div>
<div class="value" id="circulating">0</div>
</div>

<div class="card">
<div class="econ-title">LOCKED</div>
<div class="value" id="locked">0</div>
</div>

<div class="card">
<div class="econ-title">LIQUIDITY</div>
<div class="value" id="liquidity">0</div>
</div>

<div class="card">
<div class="econ-title">REWARD POOL</div>
<div class="value" id="rewardPool">0</div>
</div>

<div class="card">
<div class="econ-title">BURNED</div>
<div class="value" id="burned">0</div>
</div>

</div>

<!-- LEADERBOARD -->
<div class="card">
<h3>🏆 Leaderboard</h3>
<div id="leaderboard">Loading...</div>
</div>

</div>

<script>

const API = "https://lolagent-backend-production.up.railway.app";
const socket = io(API);

/* LOAD ECONOMY (fallback REST) */
async function loadEconomy(){
try{
const res = await fetch(API + "/api/dashboard");
const data = await res.json();

const eco = data.economy;

renderEco(eco);

}catch(e){
console.log("API error",e);
}
}

/* RENDER ECONOMY */
function renderEco(eco){
document.getElementById("totalSupply").innerText = eco.totalSupply.toLocaleString();
document.getElementById("circulating").innerText = eco.circulating.toLocaleString();
document.getElementById("locked").innerText = eco.locked.toLocaleString();
document.getElementById("liquidity").innerText = eco.liquidity.toLocaleString();
document.getElementById("rewardPool").innerText = eco.rewardPool.toLocaleString();
document.getElementById("burned").innerText = eco.burned.toLocaleString();
}

/* SOCKET LIVE UPDATE */
socket.on("economy:update",(eco)=>{
renderEco(eco);
});

/* LEADERBOARD */
socket.on("leaderboard:update",(data)=>{
let html="";
data.forEach((u,i)=>{
html += `#${i+1} ${u.userId} - ${u.mined} LOLA<br>`;
});
document.getElementById("leaderboard").innerHTML = html;
});

/* ACTION */
function followX(){
window.open("https://x.com/LolAgentAi","_blank");
}

function joinTG(){
window.open("https://t.me/LOLAgentHQ","_blank");
}

/* =========================
PI SDK
========================= */

Pi.init({
version:"2.0",
sandbox:true
});

let currentUser = null;

/* =========================
STATUS
========================= */

function setStatus(text){

document.getElementById(
"statusBox"
).innerHTML = text;

}

/* =========================
LOGIN PI
========================= */

async function loginPi(){

try{

setStatus(
"Connecting Pi Wallet..."
);

const auth =
await Pi.authenticate([
"username",
"payments",
"wallet_address"
]);

currentUser = auth;

document.getElementById(
"user-info"
).innerHTML = `

Username:
${auth.user.username}

<br><br>

Wallet:
${auth.user.wallet_address}

<br><br>

Status:
Connected ✅

`;

document.getElementById(
"buyBtn"
).disabled = false;

document.getElementById(
"claimBtn"
).disabled = false;

setStatus(
"Pi Wallet Connected ✅"
);

}catch(err){

console.log(err);

setStatus(
"Pi Login Failed ❌"
);

}

}

/* =========================
BUY LOLA
========================= */

function buyLOLA(){

if(!currentUser){

alert(
"Connect wallet first"
);

return;

}

setStatus(
"Opening Pi Payment..."
);

Pi.createPayment({

amount:1,

memo:"BUY LOLA TOKEN",

metadata:{
type:"BUY_LOLA"
}

},{

onReadyForServerApproval:
async function(paymentId){

await fetch("/api/approve",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
paymentId
})

});

},

onReadyForServerCompletion:
async function(paymentId,txid){

await fetch("/api/complete",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
paymentId,
txid
})

});

setStatus(`

Payment Success ✅

<br><br>

TXID:
${txid}

<br><br>

1000 LOLA Purchased 🚀

`);

},

onCancel:function(){

setStatus(
"Payment Cancelled ❌"
);

},

onError:function(error){

console.log(error);

setStatus(
"Payment Error ❌"
);

}

});

}

/* =========================
CLAIM
========================= */

function claimLOLA(){

if(!currentUser){

alert(
"Connect wallet first"
);

return;

}

setStatus(
"Claim Success 🚀"
);

}


/* INIT */
loadEconomy();
setInterval(loadEconomy, 5000);

</script>

</body>
</html>
