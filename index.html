<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LOOL AGENT × Pi Network</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script src="/socket.io/socket.io.js"></script>

<style>

/* ================= BASE ================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#111827,#1e293b);
color:white;
min-height:100vh;
padding:20px;
}

/* ================= BACKGROUND ================= */
.bg1,.bg2{
position:fixed;
width:500px;
height:500px;
filter:blur(180px);
opacity:0.12;
z-index:0;
}
.bg1{background:#38bdf8;top:-150px;right:-100px;}
.bg2{background:#7c3aed;bottom:-150px;left:-100px;}

/* ================= CONTAINER ================= */
.container{
position:relative;
z-index:1;
max-width:950px;
margin:auto;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
border-radius:28px;
padding:30px;
}

/* ================= NAVBAR (KEPT) ================= */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
flex-wrap:wrap;
gap:15px;
}

.logo-text{
font-size:26px;
font-weight:bold;
color:#38bdf8;
letter-spacing:2px;
}

.nav-menu{
display:flex;
gap:15px;
flex-wrap:wrap;
}

.nav-menu a{
color:#cbd5e1;
text-decoration:none;
font-weight:bold;
font-size:14px;
}
.nav-menu a:hover{color:#38bdf8;}

/* ================= HERO ================= */
.hero{
text-align:center;
margin-bottom:20px;
}

.hero h1{
color:#38bdf8;
font-size:40px;
}

.subtitle{
color:#cbd5e1;
margin-top:10px;
}

/* ================= PANELS ================= */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
margin-top:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:14px;
border:1px solid #334155;
}

.value{
color:#22c55e;
font-weight:bold;
margin-top:8px;
}

/* ================= BUTTONS SMALL ================= */
.btn{
border:none;
padding:10px 14px;
border-radius:10px;
font-size:13px;
font-weight:bold;
cursor:pointer;
margin-top:8px;
transition:0.2s;
}

.btn:hover{transform:scale(1.05);}

.btn-pi{background:#fbbf24;color:black;}
.btn-buy{background:#7c3aed;color:white;}
.btn-claim{background:#22c55e;color:black;}

.disabled{
opacity:0.5;
cursor:not-allowed;
}

/* ================= LEADERBOARD ================= */
.leaderboard{
margin-top:20px;
background:#111827;
padding:15px;
border-radius:14px;
border:1px solid #334155;
}

/* ================= FOOTER ================= */
footer{
margin-top:30px;
text-align:center;
color:#94a3b8;
font-size:12px;
line-height:1.8;
}

footer a{
color:#38bdf8;
text-decoration:none;
margin:0 8px;
}

</style>

</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>

<div class="container">

<!-- ================= NAVBAR ================= -->
<div class="navbar">

<div class="logo-text">LOOL AGENT</div>

<div class="nav-menu">
<a href="/">Home</a>
<a href="/claim.html">Faucet</a>
<a href="/quest.html">Quest</a>
<a href="/mining.html">Mining</a>
<a href="/stake.html">Stake</a>
<a href="/roadmap.html">Roadmap</a>
</div>

</div>

<!-- ================= HERO ================= -->
<div class="hero">
<h1>GIVE AWAY 100.000.000 LOLA</h1>
<p class="subtitle">How to Join</p>
</div>

<!-- ================= ACTION ================= -->
<div style="text-align:center">

<button class="btn btn-pi" onclick="loginPi()">
Connect Pi Wallet
</button>

<br>

<button id="buyBtn" class="btn btn-buy disabled" disabled onclick="buyLOLA()">
Buy 1 PI = 1000 LOLA
</button>

<button id="claimBtn" class="btn btn-claim disabled" disabled>
Claim LOLA
</button>

</div>

<!-- ================= ECONOMY ================= -->
<div class="grid">

<div class="card">
Supply
<div class="value" id="supply">0</div>
</div>

<div class="card">
Circulating
<div class="value" id="circulating">0</div>
</div>

<div class="card">
Reward Pool
<div class="value" id="reward">0</div>
</div>

<div class="card">
Burned
<div class="value" id="burned">0</div>
</div>

</div>

<!-- ================= LEADERBOARD ================= -->
<div class="leaderboard">
<h3>🏆 Leaderboard Top 10</h3>
<div id="leaderboard">Loading...</div>
</div>

<!-- ================= USER ================= -->
<div style="margin-top:15px" id="user-info">
Wallet not connected
</div>

<!-- ================= FOOTER ================= -->
<footer>

<div>
<a href="/terms.html">Terms</a>
<a href="/privacy.html">Privacy</a>
</div>

<br>

© 2026 LOOL AGENT. All Rights Reserved.

</footer>

</div>

<script>

/* ================= SOCKET ================= */
const socket = io();

/* ================= REALTIME ECONOMY ================= */
socket.on("economy:update",(eco)=>{
document.getElementById("supply").innerText = eco.totalSupply.toLocaleString();
document.getElementById("circulating").innerText = eco.circulating.toLocaleString();
document.getElementById("reward").innerText = eco.rewardPool.toLocaleString();
document.getElementById("burned").innerText = eco.burned.toLocaleString();
});

/* ================= LEADERBOARD ================= */
socket.on("leaderboard:update",(data)=>{
let html="";
data.forEach((u,i)=>{
html += `#${i+1} ${u.userId} - ${u.mined} LOLA<br>`;
});
document.getElementById("leaderboard").innerHTML = html;
});

/* ================= PI INIT ================= */
Pi.init({ version:"2.0", sandbox:true });

let user=null;

/* ================= LOGIN ================= */
async function loginPi(){
const auth = await Pi.authenticate(["username","payments","wallet_address"]);
user=auth;

document.getElementById("user-info").innerHTML =
`User: ${auth.user.username} <br> Wallet: ${auth.user.wallet_address}`;

document.getElementById("buyBtn").disabled=false;
document.getElementById("buyBtn").classList.remove("disabled");

document.getElementById("claimBtn").disabled=false;
document.getElementById("claimBtn").classList.remove("disabled");
}

/* ================= BUY ================= */
function buyLOLA(){

Pi.createPayment({
amount:1,
memo:"BUY LOLA",
metadata:{type:"BUY"}
},{
onReadyForServerApproval: async (paymentId)=>{

await fetch("/api/approve",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({paymentId})
});

},

onReadyForServerCompletion: async (paymentId,txid)=>{

await fetch("/api/complete",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({paymentId,txid})
});

alert("Purchase Success 🚀");

}
});

}

</script>

</body>
</html>
