<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LOOL AGENT × Pi Network</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script src="/socket.io/socket.io.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#111827,#1e293b);
color:white;
min-height:100vh;
padding:20px;
}

/* CONTAINER */
.container{
max-width:950px;
margin:auto;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
border-radius:28px;
padding:30px;
}

/* NAVBAR */
.navbar{
display:flex;
justify-content:space-between;
flex-wrap:wrap;
margin-bottom:20px;
}

.logo-img{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
border:3px solid #38bdf8;
box-shadow:0 0 15px rgba(56,189,248,0.5);
margin-bottom:10px;
}

.nav a{
color:#cbd5e1;
margin-right:10px;
text-decoration:none;
font-size:13px;
}

/* HERO */
.hero{
text-align:center;
margin-bottom:20px;
}

.hero h1{
color:#38bdf8;
font-size:36px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
margin-top:20px;
}

.card{
background:#1e293b;
padding:12px;
border-radius:12px;
border:1px solid #334155;
}

.value{
color:#22c55e;
font-weight:bold;
margin-top:6px;
}

/* BUTTON */
.btn{
padding:10px 14px;
border-radius:10px;
border:none;
cursor:pointer;
font-weight:bold;
margin:6px;
font-size:13px;
}

.btn-pi{background:#fbbf24;}
.btn-buy{background:#7c3aed;color:white;}
.btn-claim{background:#22c55e;}
.btn:hover{opacity:0.9}

/* LEADERBOARD */
.leaderboard{
margin-top:20px;
background:#111827;
padding:15px;
border-radius:12px;
border:1px solid #334155;
}

/* FOOTER */
footer{
margin-top:30px;
text-align:center;
font-size:12px;
color:#94a3b8;
}

footer a{
color:#38bdf8;
margin:0 6px;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<!-- NAVBAR -->
<div class="navbar">

<div class="nav">
<a href="/">Home</a>
<a href="/claim.html">Faucet</a>
<a href="/quest.html">Quest</a>
<a href="/mining.html">Mining</a>
<a href="/stake.html">Stake</a>
<a href="/roadmap.html">Roadmap</a>
<a href="/whitepaper.html">Whitepaper</a>
</div>
</div>

<div class="hero">
<img class="logo" src="logo.png" alt="LOLAGENT"/>

<!-- HERO -->
<div class="hero">
<img class="logo-img" src="logo.png" alt="LOLA COIN"/>
<h1>LOOL AGENT GIVE AWAY</h1>
<h2 style="color:#38bdf8;margin-top:5px;">
100.000.000 LOLA
</h2>

</div>

<!-- ACTION BUTTONS (ALL CLICKABLE) -->
<div style="text-align:center">

<button class="btn btn-pi" onclick="followX()">
Follow X
</button>

<button class="btn btn-pi" onclick="joinTG()">
Join Telegram
</button>

<button class="btn btn-pi" onclick="loginPi()">
Connect Pi Wallet
</button>

<br>

<button class="btn btn-buy" onclick="buyLOLA()">
Buy 1 PI = 1000 LOLA
</button>

<button class="btn btn-claim" onclick="claimLOLA()">
Claim LOLA
</button>

</div>

<!-- USER -->
<div id="user-info" style="margin-top:15px;">
Wallet not connected
</div>

<!-- ECONOMY -->
<div class="grid">

<div class="card">
Supply
<div class="value" id="supply">0</div>
</div>

<div class="card">
Circulating
<div class="value" id="circulating">0</div>
</div>

<div class="card">
Reward Pool
<div class="value" id="reward">0</div>
</div>

<div class="card">
Burned
<div class="value" id="burned">0</div>
</div>

</div>

<!-- LEADERBOARD -->
<div class="leaderboard">
<h3>🏆 Leaderboard</h3>
<div id="leaderboard">Loading...</div>
</div>

<!-- FOOTER -->
<footer>
<a href="/terms.html">Terms</a>
<a href="/privacy.html">Privacy</a>
<br><br>
© 2026 LOOL AGENT. All Rights Reserved.
</footer>

</div>

<script>

/* SOCKET */
const socket = io();

/* ECONOMY REALTIME */
socket.on("economy:update",(eco)=>{
document.getElementById("supply").innerText = eco.totalSupply.toLocaleString();
document.getElementById("circulating").innerText = eco.circulating.toLocaleString();
document.getElementById("reward").innerText = eco.rewardPool.toLocaleString();
document.getElementById("burned").innerText = eco.burned.toLocaleString();
});

/* LEADERBOARD */
socket.on("leaderboard:update",(data)=>{
let html="";
data.forEach((u,i)=>{
html += `#${i+1} ${u.userId} - ${u.mined} LOLA<br>`;
});
document.getElementById("leaderboard").innerHTML = html;
});

/* FLOW */
let currentUser=null;

/* FOLLOW X */
function followX(){
window.open("https://x.com/LolAgentAi","_blank");
}

/* JOIN TG */
function joinTG(){
window.open("https://t.me/LOLAgentHQ","_blank");
}

/* PI LOGIN */
Pi.init({version:"2.0",sandbox:true});

async function loginPi(){

const auth = await Pi.authenticate(
["username","payments","wallet_address"]
);

currentUser=auth;

document.getElementById("user-info").innerHTML =
`User: ${auth.user.username}<br>Wallet: ${auth.user.wallet_address}`;

}

/* BUY LOLA */
function buyLOLA(){

if(!currentUser){
alert("Connect wallet first");
return;
}

Pi.createPayment({
amount:1,
memo:"BUY LOLA",
metadata:{type:"BUY"}
},{
onReadyForServerApproval: async(paymentId)=>{

await fetch("/api/approve",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({paymentId})
});

},

onReadyForServerCompletion: async(paymentId,txid)=>{

await fetch("/api/complete",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({paymentId,txid})
});

alert("Success 🚀");

}

});

}

/* CLAIM */
function claimLOLA(){
alert("Claim system coming soon");
}

</script>

</body>
</html>
