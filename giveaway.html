<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LOLAGENT GIVEAWAY</title>

<style>

body{
  background:#020617;
  color:white;
  font-family:Arial;
  padding:30px;
  margin:0;
}

.container{
  max-width:1200px;
  margin:auto;
}

.hero{
  background:#111827;
  border-radius:24px;
  padding:50px;
  text-align:center;
  border:1px solid rgba(255,255,255,0.08);
  margin-bottom:30px;
}

.hero h1{
  color:#38bdf8;
  font-size:42px;
  margin-bottom:10px;
}

.hero p{
  color:#cbd5e1;
}

.grid{
  display:grid;
  grid-template-columns:
  repeat(auto-fit,minmax(280px,1fr));
  gap:25px;
}

.card{
  background:#111827;
  border-radius:20px;
  padding:25px;
  border:1px solid rgba(255,255,255,0.08);
  text-align:center;
}

.card h2{
  color:#38bdf8;
  margin-bottom:20px;
}

.reward{
  font-size:34px;
  font-weight:bold;
  color:#22c55e;
  margin-bottom:20px;
}

button{
  width:100%;
  background:#38bdf8;
  color:black;
  border:none;
  padding:15px;
  border-radius:14px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  opacity:0.8;
}

.popup{
  position:fixed;
  top:20px;
  right:20px;
  background:#22c55e;
  padding:15px 20px;
  border-radius:14px;
  display:none;
  color:black;
  font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<div class="hero">

<h1>
LOLAGENT GIVEAWAY 🎁
</h1>

<p>
AI Agents × Meme Culture × Pioneer Community
</p>

</div>

<div class="grid">

<div class="card">

<h2>
Twitter Giveaway
</h2>

<div class="reward">
10M LOLA
</div>

<button onclick="joinGiveaway()">
Join Now
</button>

</div>

<div class="card">

<h2>
Meme Contest
</h2>

<div class="reward">
15M LOLA
</div>

<button onclick="joinGiveaway()">
Submit Meme
</button>

</div>

<div class="card">

<h2>
Referral Event
</h2>

<div class="reward">
25M LOLA
</div>

<button onclick="joinGiveaway()">
Invite Friends
</button>

</div>

</div>

</div>

<div class="popup" id="popup">
Success Join Giveaway 🚀
</div>

<script>

function joinGiveaway(){

const popup =
document.getElementById('popup');

popup.style.display = 'block';

setTimeout(()=>{

popup.style.display = 'none';

},2000);

}

</script>

</body>
</html>
